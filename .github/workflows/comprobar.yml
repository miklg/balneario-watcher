name: Comprobar reservas del Balneario

on:
  schedule:
    - cron: "2-59/5 * * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: balneario-watcher
  cancel-in-progress: false

jobs:
  comprobar:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalar dependencias
        run: python -m pip install -r requirements.txt

      - name: Consultar CoverManager
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python balneario_telegram.py

      - name: Guardar estado actualizado
        run: |
          if git diff --quiet -- estado.json; then
            echo "El estado no ha cambiado."
            exit 0
          fi

          git config user.name "balneario-watcher"
          git config user.email "actions@users.noreply.github.com"

          git add estado.json
          git commit -m "Actualizar estado de disponibilidad"
          git push
